# Test Configuration - Override main application properties
spring.application.name=user-service

# Disable database connection for integration tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate configuration for H2
spring.jpa.database=H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# JWT Configuration (same as main)
jwt.access-token-expiry-minutes=30
jwt.refresh-token-expiry-days=7
jwt.issuer-uri=http://localhost:8081

