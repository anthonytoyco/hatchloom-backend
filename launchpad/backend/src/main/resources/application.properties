spring.application.name=launchpad

# Flyway - auto-configured by spring-boot-starter-flyway: only override location if needed
spring.flyway.locations=classpath:db/migration

# JPA - let Flyway own the schema: Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate

# JWT from Auth service - LaunchPad validates tokens but does not issue them
auth.service.jwks-uri=${AUTH_SERVICE_URL:http://auth-service:8080}/.well-known/jwks.json

