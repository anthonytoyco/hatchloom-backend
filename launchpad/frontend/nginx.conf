server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to the backend container (avoids CORS)
  # Keep UI routes under /launchpad/* for React Router.
  location /api/launchpad/ {
    proxy_pass http://launchpad:8080/launchpad/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Proxy auth calls to auth-service so the frontend can authenticate directly.
  location /api/auth/ {
    proxy_pass http://auth-service:8080/auth/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # React Router SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache immutable static assets generated by Vite
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
