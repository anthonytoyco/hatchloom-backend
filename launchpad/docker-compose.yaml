services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: launchpad_db
      POSTGRES_USER: launchpad_user
      POSTGRES_PASSWORD: launchpad_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launchpad_user -d launchpad_db"]
      interval: 10s
      retries: 5

  launchpad:
    build: ./backend
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/launchpad_db
      SPRING_DATASOURCE_USERNAME: launchpad_user
      SPRING_DATASOURCE_PASSWORD: launchpad_pass
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://auth:8081
    depends_on:
      postgres:
        condition: service_healthy
    # auth service is external - it is NOT defined here
    # Token validation will fail if auth is unreachable, but
    # GET /launchpad/positions/{id}/status remains public regardless

  frontend:
    build:
      context: ./frontend
      args:
        # VITE_* vars are baked into the static bundle at build time.
        # Browser hits frontend nginx at /api, which proxies to backend.
        VITE_API_BASE_URL: "/api"
        # ConnectHub API URL - browser-accessible address for cross-service calls
        VITE_CONNECTHUB_API_URL: "http://localhost:8080"
    ports:
      - "4173:80"
    depends_on:
      - launchpad
