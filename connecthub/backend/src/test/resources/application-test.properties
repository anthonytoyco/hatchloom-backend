spring.application.name=connecthub-service

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.defer-datasource-initialization=true

server.servlet.session.cookie.same-site=none

spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
jwt.secret=your-secret-key-change-this-in-production-at-least-256-bits-long-for-security
auth.service.jwks-uri=http://localhost/dummy
launchpad.service.url=http://localhost:8080
