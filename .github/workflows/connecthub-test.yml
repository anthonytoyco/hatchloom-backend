name: connecthub-test

on:
  push:
    branches: [main]
    paths:
      - connecthub/**
      - .github/workflows/connecthub-test.yml
  pull_request:
    branches: [main]
    paths:
      - connecthub/**
      - .github/workflows/connecthub-test.yml

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test with Maven
        working-directory: connecthub/backend
        run: mvn clean verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: connecthub/backend/target/surefire-reports/

  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert owner name to lowercase
        run: |
          echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./connecthub/backend
          file: ./connecthub/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/connecthub:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
