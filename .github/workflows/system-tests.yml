name: system-tests

on:
  workflow_run:
    workflows:
      - user-service-backend
      - connecthub-backend
      - launchpad-backend
    types: [completed]
    branches: [main]

concurrency:
  group: system-tests-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  system-tests:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run system tests
        run: |
          cd system-tests
          mvn test

      - name: Upload surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: system-test-surefire-reports-${{ github.run_id }}
          path: system-tests/target/surefire-reports/
          retention-days: 30
