name: launchpad-backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-with-postgres:
    name: Test (Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
      SPRING_DATASOURCE_USERNAME: testuser
      SPRING_DATASOURCE_PASSWORD: testpass
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8081

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run unit tests
        working-directory: launchpad/backend
        run: |
          chmod +x mvnw
          ./mvnw clean test

      - name: Run integration tests
        working-directory: launchpad/backend
        run: ./mvnw verify -DskipIntegrationGroups=

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-launchpad-backend-${{ github.run_id }}
          path: launchpad/backend/target/surefire-reports/
          retention-days: 30

      - name: Upload failsafe reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-launchpad-backend-${{ github.run_id }}
          path: launchpad/backend/target/failsafe-reports/
          retention-days: 30

  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test-with-postgres]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert owner to lowercase
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./launchpad/backend
          file: ./launchpad/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/launchpad-backend:latest
            ghcr.io/${{ env.OWNER_LC }}/launchpad-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
