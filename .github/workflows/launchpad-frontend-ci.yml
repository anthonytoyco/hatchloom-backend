name: launchpad-frontend-ci

on:
  push:
    branches: [main]
    paths:
      - launchpad/frontend/**
      - .github/workflows/launchpad-frontend-ci.yml
  pull_request:
    branches: [main]
    paths:
      - launchpad/frontend/**
      - .github/workflows/launchpad-frontend-ci.yml

jobs:
  # Validate lint, types, and production bundle output
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: launchpad/frontend/package-lock.json

      - name: Install dependencies
        working-directory: launchpad/frontend
        run: npm ci

      - name: Run lint
        working-directory: launchpad/frontend
        run: npm run lint

      - name: Run typecheck
        working-directory: launchpad/frontend
        run: npm run typecheck

      - name: Build production bundle
        working-directory: launchpad/frontend
        run: npm run build

      - name: Upload frontend build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launchpad-frontend-dist
          path: launchpad/frontend/dist/**

  # Build and publish image only for pushes to main after checks pass
  build-docker:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert owner name to lowercase
        run: |
          echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./launchpad/frontend
          file: ./launchpad/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/hatchloom-frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/hatchloom-frontend:${{ github.sha }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
