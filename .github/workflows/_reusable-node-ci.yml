name: Reusable Node CI

on:
  workflow_call:
    inputs:
      service-path:
        description: "Relative path to the frontend directory (e.g. launchpad/frontend)"
        required: true
        type: string
      image-name:
        description: "Image name to publish to GHCR (e.g. hatchloom-frontend)"
        required: true
        type: string
      node-version:
        description: "Node.js version"
        required: false
        type: string
        default: "22"
      run-typecheck:
        description: "Run npm run typecheck as a separate step (enable for projects with a typecheck script)"
        required: false
        type: boolean
        default: false

jobs:
  test:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.service-path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.service-path }}
        run: npm ci

      - name: Lint
        working-directory: ${{ inputs.service-path }}
        run: npm run lint

      - name: Typecheck
        if: ${{ inputs.run-typecheck }}
        working-directory: ${{ inputs.service-path }}
        run: npm run typecheck

      - name: Build production bundle
        working-directory: ${{ inputs.service-path }}
        run: npm run build

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ inputs.image-name }}-${{ github.run_id }}
          path: ${{ inputs.service-path }}/dist/
          retention-days: 7

  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert owner to lowercase
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ inputs.service-path }}
          file: ./${{ inputs.service-path }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/${{ inputs.image-name }}:latest
            ghcr.io/${{ env.OWNER_LC }}/${{ inputs.image-name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
