name: deploy

on:
  workflow_run:
    workflows:
      - system-tests
      - launchpad-frontend
      - user-service-frontend
      - connecthub-frontend
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Check all CI workflows passed
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const required = ['launchpad-backend', 'user-service-backend', 'connecthub-backend', 'system-tests', 'launchpad-frontend', 'user-service-frontend', 'connecthub-frontend'];
            const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: sha,
              per_page: 100,
            });
            const passed = workflow_runs
              .filter(r => r.conclusion === 'success')
              .map(r => r.name);
            const allPassed = required.every(name => passed.includes(name));
            console.log(`Passed so far: ${passed.join(', ')}`);
            console.log(`All required passed: ${allPassed}`);
            core.setOutput('all-passed', allPassed.toString());

      - name: Deploy to hatchloom-backend VM
        if: steps.gate.outputs.all-passed == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          script: |
            set -e
            cd /home/anthonytoyco/app/hatchloom-backend
            git pull --ff-only origin main
            docker compose up -d --build
            docker compose ps
