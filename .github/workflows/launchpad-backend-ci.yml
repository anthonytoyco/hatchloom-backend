name: launchpad-backend-ci

on:
  push:
    branches: [main]
    paths:
      - launchpad/backend/src/**
      - launchpad/backend/pom.xml
      - launchpad/backend/mvnw
      - launchpad/backend/mvnw.cmd
      - launchpad/backend/.mvn/**
      - launchpad/backend/Dockerfile
      - launchpad/docker-compose.yaml
      - .github/workflows/launchpad-backend-ci.yml
  pull_request:
    branches: [main]
    paths:
      - launchpad/backend/src/**
      - launchpad/backend/pom.xml
      - launchpad/backend/mvnw
      - launchpad/backend/mvnw.cmd
      - launchpad/backend/.mvn/**
      - launchpad/backend/Dockerfile
      - launchpad/docker-compose.yaml
      - .github/workflows/launchpad-backend-ci.yml

jobs:
  # Validate the service against a real Postgres dependency
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: launchpad_db
          POSTGRES_USER: launchpad_user
          POSTGRES_PASSWORD: launchpad_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U launchpad_user -d launchpad_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Point Spring to the service-container database in GitHub Actions
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/launchpad_db
      SPRING_DATASOURCE_USERNAME: launchpad_user
      SPRING_DATASOURCE_PASSWORD: launchpad_pass
      # Auth service is not started in CI test job, keep issuer explicit
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8081

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run unit tests
        working-directory: launchpad/backend
        run: |
          chmod +x mvnw
          ./mvnw test

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launchpad-surefire-reports
          path: launchpad/backend/target/surefire-reports/**

  # Build and publish image only for pushes to main after tests pass
  build-docker:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert owner name to lowercase
        run: |
          echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./launchpad/backend
          file: ./launchpad/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/hatchloom-launchpad:latest
            ghcr.io/${{ env.OWNER_LC }}/hatchloom-launchpad:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
