name: push-main

on:
  push:
    branches: [main]

concurrency:
  group: push-main-${{ github.sha }}
  cancel-in-progress: true

jobs:
  user-service-backend:
    uses: ./.github/workflows/_reusable-java-ci.yml
    with:
      service-path: user-service
      image-name: user-service-backend
      jwt-secret: test-secret-key-for-ci-cd-pipeline-at-least-256-bits
    permissions:
      contents: read
      packages: write

  connecthub-backend:
    uses: ./.github/workflows/_reusable-java-ci.yml
    with:
      service-path: connecthub/backend
      image-name: connecthub-backend
    permissions:
      contents: read
      packages: write

  launchpad-backend:
    uses: ./.github/workflows/_reusable-java-ci.yml
    with:
      service-path: launchpad/backend
      image-name: launchpad-backend
      oauth2-issuer-uri: http://localhost:8081
    permissions:
      contents: read
      packages: write

  user-service-frontend:
    uses: ./.github/workflows/_reusable-node-ci.yml
    with:
      service-path: user-service/frontend
      image-name: user-service-frontend
    permissions:
      contents: read
      packages: write

  connecthub-frontend:
    uses: ./.github/workflows/_reusable-node-ci.yml
    with:
      service-path: connecthub/frontend
      image-name: connecthub-frontend
    permissions:
      contents: read
      packages: write

  launchpad-frontend:
    uses: ./.github/workflows/_reusable-node-ci.yml
    with:
      service-path: launchpad/frontend
      image-name: launchpad-frontend
      run-typecheck: true
    permissions:
      contents: read
      packages: write

  system-tests:
    name: System Tests
    needs: [user-service-backend, connecthub-backend, launchpad-backend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start backend stack
        env:
          IMAGE_TAG: ${{ github.sha }}
          AUTH_DB: ${{ secrets.AUTH_DB }}
          AUTH_USER: ${{ secrets.AUTH_USER }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
          LAUNCHPAD_DB: ${{ secrets.LAUNCHPAD_DB }}
          LAUNCHPAD_USER: ${{ secrets.LAUNCHPAD_USER }}
          LAUNCHPAD_PASSWORD: ${{ secrets.LAUNCHPAD_PASSWORD }}
          CONNECTHUB_DB: ${{ secrets.CONNECTHUB_DB }}
          CONNECTHUB_USER: ${{ secrets.CONNECTHUB_USER }}
          CONNECTHUB_PASSWORD: ${{ secrets.CONNECTHUB_PASSWORD }}
          JWT_ACCESS_TOKEN_EXPIRY_MINUTES: ${{ secrets.JWT_ACCESS_TOKEN_EXPIRY_MINUTES }}
          JWT_REFRESH_TOKEN_EXPIRY_DAYS: ${{ secrets.JWT_REFRESH_TOKEN_EXPIRY_DAYS }}
          JWT_ISSUER_URI: ${{ secrets.JWT_ISSUER_URI }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          AUTH_SERVICE_URL: ${{ secrets.AUTH_SERVICE_URL }}
          LAUNCHPAD_SERVICE_URL: ${{ secrets.LAUNCHPAD_SERVICE_URL }}
        run: |
          docker compose -f docker-compose.test.yaml up -d
          docker compose -f docker-compose.test.yaml ps
          echo "Waiting for auth-service..."
          timeout 300 bash -c 'until curl -sf http://localhost:8081/.well-known/openid-configuration > /dev/null 2>&1; do sleep 5; done'
          echo "Auth-service ready"
          echo "Waiting for connecthub-service..."
          timeout 300 bash -c 'until curl -sf -o /dev/null -w "%{http_code}" http://localhost:8083/api/feed 2>/dev/null | grep -qv "^5"; do sleep 5; done'
          echo "ConnectHub-service ready"
          echo "Waiting for launchpad-service..."
          timeout 300 bash -c 'until curl -sf http://localhost:8082/actuator/health > /dev/null 2>&1; do sleep 5; done'
          echo "Launchpad-service ready"

      - name: Run system tests
        run: |
          cd system-tests
          mvn test

      - name: Upload surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: system-test-surefire-reports-${{ github.run_id }}
          path: system-tests/target/surefire-reports/
          retention-days: 30

      - name: Dump docker logs on failure
        if: failure()
        env:
          IMAGE_TAG: ${{ github.sha }}
          AUTH_DB: ${{ secrets.AUTH_DB }}
          AUTH_USER: ${{ secrets.AUTH_USER }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
          LAUNCHPAD_DB: ${{ secrets.LAUNCHPAD_DB }}
          LAUNCHPAD_USER: ${{ secrets.LAUNCHPAD_USER }}
          LAUNCHPAD_PASSWORD: ${{ secrets.LAUNCHPAD_PASSWORD }}
          CONNECTHUB_DB: ${{ secrets.CONNECTHUB_DB }}
          CONNECTHUB_USER: ${{ secrets.CONNECTHUB_USER }}
          CONNECTHUB_PASSWORD: ${{ secrets.CONNECTHUB_PASSWORD }}
          JWT_ACCESS_TOKEN_EXPIRY_MINUTES: ${{ secrets.JWT_ACCESS_TOKEN_EXPIRY_MINUTES }}
          JWT_REFRESH_TOKEN_EXPIRY_DAYS: ${{ secrets.JWT_REFRESH_TOKEN_EXPIRY_DAYS }}
          JWT_ISSUER_URI: ${{ secrets.JWT_ISSUER_URI }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          AUTH_SERVICE_URL: ${{ secrets.AUTH_SERVICE_URL }}
          LAUNCHPAD_SERVICE_URL: ${{ secrets.LAUNCHPAD_SERVICE_URL }}
        run: |
          docker compose -f docker-compose.test.yaml ps -a
          docker compose -f docker-compose.test.yaml logs --tail 150

      - name: Cleanup
        if: always()
        env:
          IMAGE_TAG: ${{ github.sha }}
          AUTH_DB: ${{ secrets.AUTH_DB }}
          AUTH_USER: ${{ secrets.AUTH_USER }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
          LAUNCHPAD_DB: ${{ secrets.LAUNCHPAD_DB }}
          LAUNCHPAD_USER: ${{ secrets.LAUNCHPAD_USER }}
          LAUNCHPAD_PASSWORD: ${{ secrets.LAUNCHPAD_PASSWORD }}
          CONNECTHUB_DB: ${{ secrets.CONNECTHUB_DB }}
          CONNECTHUB_USER: ${{ secrets.CONNECTHUB_USER }}
          CONNECTHUB_PASSWORD: ${{ secrets.CONNECTHUB_PASSWORD }}
          JWT_ACCESS_TOKEN_EXPIRY_MINUTES: ${{ secrets.JWT_ACCESS_TOKEN_EXPIRY_MINUTES }}
          JWT_REFRESH_TOKEN_EXPIRY_DAYS: ${{ secrets.JWT_REFRESH_TOKEN_EXPIRY_DAYS }}
          JWT_ISSUER_URI: ${{ secrets.JWT_ISSUER_URI }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          AUTH_SERVICE_URL: ${{ secrets.AUTH_SERVICE_URL }}
          LAUNCHPAD_SERVICE_URL: ${{ secrets.LAUNCHPAD_SERVICE_URL }}
        run: docker compose -f docker-compose.test.yaml down -v

  deploy:
    name: Deploy to VM
    needs:
      [
        system-tests,
        user-service-frontend,
        connecthub-frontend,
        launchpad-frontend,
      ]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy to hatchloom-backend VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          script: |
            set -e
            cd /home/anthonytoyco/app/hatchloom-backend
            git pull --ff-only origin main
            docker compose up -d --build
            docker compose ps
